; =============================================================================
; PlatformIO project for the SCA Smart Key firmware (ESP32-S3).
;
;   pio run                 -> build firmware for esp32-s3-devkitc-1
;   pio run -t upload       -> flash
;   pio device monitor      -> serial console @115200
;
; The crypto/auth/state-machine logic is additionally unit-tested on the host
; with Google Test (see ../tests and ../README.md) using -DSCA_HOST_BUILD.
; =============================================================================

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
build_unflags =
    -std=gnu++11
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    adafruit/Adafruit PN532@^1.3.3
; mbedTLS ships with the ESP-IDF/Arduino core, so no extra dependency needed.
